<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理年龄测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        .test-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            position: relative;
        }
        .question-slide {
            display: none;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        .question-slide.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-bar {
            height: 5px;
            background: #eee;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-number {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .question-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }
        .option-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateX(5px);
        }
        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .result-slide {
            text-align: center;
            padding: 60px 40px;
        }
        .result-title {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
        }
        .result-age {
            font-size: 60px;
            font-weight: 900;
            color: #333;
            margin: 20px 0;
        }
        .result-desc {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 40px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .restart-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- 第1题 -->
        <div class="question-slide active" id="q1">
            <div class="question-number">问题 1 / 5</div>
            <div class="question-title">遇到不顺心的事，你通常会怎么做？</div>
            <div class="options">
                <button class="option-btn" data-score="1">A. 闷在心里，慢慢消化</button>
                <button class="option-btn" data-score="2">B. 找朋友吐槽，说完就忘</button>
                <button class="option-btn" data-score="3">C. 先解决问题，再处理情绪</button>
                <button class="option-btn" data-score="4">D. 吃顿好的/睡一觉就好了</button>
            </div>
        </div>

        <!-- 第2题 -->
        <div class="question-slide" id="q2">
            <div class="question-number">问题 2 / 5</div>
            <div class="question-title">周末你更倾向于怎么过？</div>
            <div class="options">
                <button class="option-btn" data-score="1">A. 宅家睡觉/追剧，彻底躺平</button>
                <button class="option-btn" data-score="2">B. 约朋友吃饭逛街，热闹一点</button>
                <button class="option-btn" data-score="3">C. 安排学习/运动，提升自己</button>
                <button class="option-btn" data-score="4">D. 随机出门，想到哪玩到哪</button>
            </div>
        </div>

        <!-- 第3题 -->
        <div class="question-slide" id="q3">
            <div class="question-number">问题 3 / 5</div>
            <div class="question-title">别人对你的评价，你会在意吗？</div>
            <div class="options">
                <button class="option-btn" data-score="1">A. 非常在意，会反复琢磨</button>
                <button class="option-btn" data-score="2">B. 分人，重要的人的评价会在意</button>
                <button class="option-btn" data-score="3">C. 有则改之，无则加勉，不往心里去</button>
                <button class="option-btn" data-score="4">D. 完全不在意，我开心最重要</button>
            </div>
        </div>

        <!-- 第4题 -->
        <div class="question-slide" id="q4">
            <div class="question-number">问题 4 / 5</div>
            <div class="question-title">面对选择时，你通常会？</div>
            <div class="options">
                <button class="option-btn" data-score="1">A. 纠结很久，害怕选错</button>
                <button class="option-btn" data-score="2">B. 听别人的建议，跟着大家选</button>
                <button class="option-btn" data-score="3">C. 快速分析利弊，果断决定</button>
                <button class="option-btn" data-score="4">D. 抛硬币/凭直觉，选了就不后悔</button>
            </div>
        </div>

        <!-- 第5题 -->
        <div class="question-slide" id="q5">
            <div class="question-number">问题 5 / 5</div>
            <div class="question-title">你对未来的生活，更多是？</div>
            <div class="options">
                <button class="option-btn" data-score="1">A. 有点迷茫，走一步看一步</button>
                <button class="option-btn" data-score="2">B. 充满期待，相信会越来越好</button>
                <button class="option-btn" data-score="3">C. 规划得很清楚，按计划推进</button>
                <button class="option-btn" data-score="4">D. 顺其自然，享受当下就好</button>
            </div>
        </div>

        <!-- 结果页 -->
        <div class="question-slide result-slide" id="result">
            <div class="result-title">你的心理年龄是</div>
            <div class="result-age" id="finalAge">--</div>
            <div class="result-desc" id="finalDesc"></div>
            <button class="restart-btn" onclick="restartTest()">重新测试</button>
        </div>
    </div>

    <script>
        let currentQuestion = 1;
        let totalScore = 0;
        const totalQuestions = 5;

        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const score = parseInt(this.dataset.score);
                totalScore += score;
                showNextQuestion();
            });
        });

        function showNextQuestion() {
            document.getElementById(`q${currentQuestion}`).classList.remove('active');
            currentQuestion++;
            const progressPercent = (currentQuestion / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;

            if (currentQuestion > totalQuestions) {
                showResult();
            } else {
                document.getElementById(`q${currentQuestion}`).classList.add('active');
            }
        }

        function showResult() {
            document.getElementById('result').classList.add('active');
            let age, desc;
            if (totalScore <= 6) {
                age = 18;
                desc = "你的心理年龄像18岁的少年，对世界充满好奇，敢爱敢恨，永远保持着热烈与冲劲。";
            } else if (totalScore <= 10) {
                age = 25;
                desc = "你的心理年龄在25岁左右，有自己的小成熟，也保留着一份孩子气，懂得在现实和热爱之间找平衡。";
            } else if (totalScore <= 14) {
                age = 35;
                desc = "你的心理年龄约35岁，处事沉稳，情绪稳定，懂得接纳不完美，和生活和解。";
            } else {
                age = 45;
                desc = "你的心理年龄像45岁的智者，通透豁达，见过风雨却依然温柔，有着看透不说破的松弛感。";
            }
            document.getElementById('finalAge').textContent = `${age}岁`;
            document.getElementById('finalDesc').textContent = desc;
        }

        function restartTest() {
            currentQuestion = 1;
            totalScore = 0;
            document.querySelectorAll('.question-slide').forEach(slide => slide.classList.remove('active'));
            document.getElementById('q1').classList.add('active');
            document.getElementById('progressFill').style.width = '0%';
        }
    </script>
</body>
</html>
