        }
        .restart-btn {
            margin-top: 30px;
        }
        /* 隐藏原下一题按钮 */
        #nextBtn {
            display: none;
        }
    </style>
</head>

            let optC = optionText[qIdx * 4 + 2];
            let optD = optionText[qIdx * 4 + 3];

            let html = `
                <div class="q-num">第${qIdx+1}题</div>
                <div class="q-content">${qText}</div>
                <div class="option" onclick="selectOption(0,this)">${optA}</div>
                <div class="option" onclick="selectOption(1,this)">${optB}</div>
                <div class="option" onclick="selectOption(2,this)">${optC}</div>
                <div class="option" onclick="selectOption(3,this)">${optD}</div>
            `;
            document.getElementById("qBox").innerHTML = html;

            // 回显已选答案
            if(answerArr[qIdx] !== undefined){
                let opts = document.querySelectorAll(".option");
                opts[answerArr[qIdx]].classList.add("selected");
            }
        }

        // 选择选项并自动翻页
        function selectOption(score, dom){
            answerArr[currentQ] = score;
            let opts = document.querySelectorAll(".option");
            opts.forEach(item=>item.classList.remove("selected"));
            dom.classList.add("selected");

            // 最后一题直接出结果，否则自动下一题
            if(currentQ < 29){
                currentQ++;
                renderQuestion();
            }else{
                totalScore = answerArr.reduce((a,b)=>a+b, 0);
                let res = {};
                for(let item of resultList){
                    if(totalScore >= item.min && totalScore <= item.max){
                        res = item;
                        break;
                    }
                }
                document.getElementById("questionPage").classList.remove("show");
                document.getElementById("resultPage").classList.add("show");
                document.getElementById("ageResult").innerText = res.age;
                document.getElementById("scoreText").innerText = `本次答题总分数：${totalScore} 分`;
                document.getElementById("analysisText").innerText = res.analysis;
            }
        }

        // 重新测试
        function restartTest(){
            currentQ = 0;
            totalScore = 0;
            answerArr = [];
            document.getElementById("resultPage").classList.remove("show");
            document.getElementById("loginPage").classList.add("show");
            document.getElementById("authCode").value = "";
        }
    </script>
</body>
</html>
